name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore RE9SaveDecryptor.csproj

    - name: Build the application
      run: dotnet build RE9SaveDecryptor.csproj -c Release --no-restore

    - name: Publish the application
      run: dotnet publish RE9SaveDecryptor.csproj -c Release -o publish

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: net10.0
        path: publish/**
